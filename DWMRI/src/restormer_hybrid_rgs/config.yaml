dbrain:
  train:
    num_epochs: 360
    device: cuda
    seed: 42
    reproducible: false
    mask_p: 0.3
    learning_rate: 0.00045
    batch_size: 64
    use_amp: true
    use_scheduler: false
    scheduler_type: "step"
    checkpoint_dir: "restormer_hybrid_rgs/checkpoints/dbrain"
    progressive:
      enabled: true
      stages:
        - patch_size: 32
          batch_size: 64
          epochs: 120
          step: 8
        - patch_size: 24
          batch_size: 128
          epochs: 120
          step: 6
        - patch_size: 16
          batch_size: 256
          epochs: 120
          step: 4
    multi_gpu: false
    gpu_ids: [0, 1, 2]
    auto_scale_lr: true
    auto_exclude_imbalanced: true
    memory_threshold: 0.15
    scheduler_T_0: 20
    eta_min_lr: 0.0001
    scheduler_T_mult: 2
    scheduler_step_size: 100
    scheduler_gamma: 0.5
    scheduler_patience: 10
    scheduler_factor: 0.8
    min_lr: 0.0001
    subset_fraction: 1.0  # <1.0 = random fraction of training patches; use --set dbrain.train.subset_fraction=...
    subset_max_patches: null  # Optional cap after fraction; null = no cap
  reconstruct:
    device: cuda
    use_amp: true
    mask_p: 0.3
    n_preds: 12
    pred_chunk_size: null
    n_context_samples: 16
    patch_size: 32
    overlap: 1
    rescale_to_01: true
    rescale_mode: "per_volume"
    clip_to_range: true
    subtract_background_estimate: false
    subtract_background_threshold: 0.02
    metrics_roi_threshold: 0.02
    compute_dti: true
    metrics_dir: "restormer_hybrid_rgs/metrics/dbrain"
    images_dir: "restormer_hybrid_rgs/images/dbrain"
  model:
    in_channel: 16
    out_channel: 1
    output_activation: "prelu"
    dim: 12
    num_blocks: [1, 2, 2]
    num_refinement_blocks: 2
    heads: [1, 2, 2]
    ffn_expansion_factor: 1.5
    bias: false
    LayerNorm_type: "WithBias"
    scale_and_shift: true
    use_film_conditioning: false
    film_hidden_dim: 32
  data:
    patch_size: 32
    step: 8
    num_b0s: 6
    num_volumes: 16
    shell_sampling_mode: rgs
    num_input_volumes: 16
    shell_gradient_volumes: 60
    target_channel: 15
    noise_sigma: 0.1
    noise_type: "rician"
    noise_n_coils: 1
    bvalue: 2500
    take_x: 128
    take_y: 128
    take_z: 96
    nii_path: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
    nii_path_lightning: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path_lightning: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
    nii_path_tinieblas: "/home/paco/d_brain/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path_tinieblas: "/home/paco/d_brain/D_BRAIN_b2500_6_60_14_HCP_b_matrix.txt"
    patch_filter_method: "threshold"
    min_signal_threshold: 0.02
    otsu_median_radius: 2
    otsu_numpass: 1
stanford:
  train:
    num_epochs: 900
    device: cuda
    seed: 42
    reproducible: false
    supervised: false  # true => full MSE vs target volume (no masked J-invariant loss)
    mask_p: 0.3
    learning_rate: 0.00045
    batch_size: 64
    use_amp: true
    use_scheduler: false
    checkpoint_dir: "restormer_hybrid_rgs/checkpoints/stanford"
    multi_gpu: false
    gpu_ids: [0, 1, 2]
    auto_scale_lr: true
    auto_exclude_imbalanced: true
    memory_threshold: 0.15
    scheduler_T_0: 20
    eta_min_lr: 0.0001
    scheduler_T_mult: 2
    scheduler_step_size: 100
    scheduler_gamma: 0.8
    scheduler_patience: 10
    scheduler_factor: 0.8
    min_lr: 0.0001
    subset_fraction: 1.0
    subset_max_patches: null
    progressive:
      enabled: true
      stages:
        - patch_size: 32
          batch_size: 64
          epochs: 300
          step: 8
        - patch_size: 24
          batch_size: 128
          epochs: 300
          step: 6
        - patch_size: 16
          batch_size: 256
          epochs: 300
          step: 4
  model:
    in_channel: 16
    out_channel: 1
    output_activation: "prelu"
    dim: 12
    num_blocks: [1, 2, 2]
    num_refinement_blocks: 2
    heads: [1, 2, 2]
    ffn_expansion_factor: 1.5
    bias: false
    LayerNorm_type: "WithBias"
    scale_and_shift: true
    use_film_conditioning: false
    film_hidden_dim: 32
  data:
    num_volumes: 16
    shell_sampling_mode: rgs  # sequential (sliding-K over full shell) | rgs
    num_input_volumes: 16
    shell_gradient_volumes: 150
    target_channel: 15
    train_num_volumes: 16
    reconstruct_full_dwi: true
    noise_type: "rician"
    num_b0s: 10
    noise_sigma: 0.01
    bvalue: 2000  # Per DIPY documentation (Rokem et al., 2015)
    patch_size: 32
    step: 8
    take_x: 80
    take_y: 106
    take_z: 76
    patch_filter_method: "threshold"
    min_signal_threshold: 0.02
    otsu_median_radius: 2
    otsu_numpass: 1
  reconstruct:
    device: cuda
    use_amp: true
    mask_p: 0.3
    n_preds: 23
    pred_chunk_size: null
    n_context_samples: 16
    patch_size: 32
    overlap: 1
    rescale_to_01: true
    rescale_mode: "per_volume"
    clip_to_range: true
    subtract_background_estimate: false
    subtract_background_threshold: 0.02
    metrics_roi_threshold: 0.02
    compute_dti: true
    metrics_dir: "restormer_hybrid_rgs/metrics/stanford"
    images_dir: "restormer_hybrid_rgs/images/stanford"
