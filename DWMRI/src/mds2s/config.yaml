dbrain:
  train:
    num_epochs: 1000
    device: cuda
    mask_p: 0.3
    dropout_p: 0.3
    learning_rate: 0.0001
    batch_size: 8
    use_scheduler: True
    scheduler_step_size: 500
    scheduler_gamma: 0.5
    checkpoint_dir: "mds2s/checkpoints/dbrain"
  reconstruct:
    n_preds: 10
    mask_p: 0.3
    device: cuda
    metrics_dir: "mds2s/metrics/dbrain"
    images_dir: "mds2s/images/dbrain"
    compute_dti: true
    metrics_roi_threshold: 0.02  # ROI = original > threshold (tissue). Saves metrics.json + metrics_roi.json
  model:
    in_channel: 60 # is the same as the number of volumes
    out_channel: 60
  data:
    num_b0s: 6
    num_volumes: 60
    noise_sigma: 0.1
    bvalue: 2500
    nii_path: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
    nii_path_lightning: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path_lightning: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
    nii_path_tinieblas: "/home/paco/d_brain/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path_tinieblas: "/home/paco/d_brain/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
stanford:
  train:
    num_epochs: 1000
    device: cuda
    mask_p: 0.3
    dropout_p: 0.3
    checkpoint_dir: "mds2s/checkpoints/stanford"
    learning_rate: 0.0003
    batch_size: 8
    use_scheduler: false
    scheduler_step_size: 500
    scheduler_gamma: 0.5
  reconstruct:
    n_preds: 10
    mask_p: 0.3
    device: cuda
    metrics_dir: "mds2s/metrics/stanford"
    images_dir: "mds2s/images/stanford"
    compute_dti: false
    metrics_roi_threshold: 0.02  # ROI = original > threshold (tissue). Saves metrics.json + metrics_roi.json
  model:
    in_channel: 150
    out_channel: 150
  data:
    num_b0s: 10
    num_volumes: 150
    noise_sigma: 0.01
    bvalue: 2500
