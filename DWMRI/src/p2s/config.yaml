# Weights & Biases (optional; set enabled: false for offline runs)
wandb:
  enabled: true
  project: "DWMRI-Denoising"

dbrain:
  patch2self:
    # ---------- backend selection ----------------------------------------
    # "dipy"             — DIPY's built-in patch2self (default)
    # "sklearn_reference" — volume hold-out sklearn regression (MD-S2S style)
    backend: "dipy"
    # ---------- DIPY backend options ------------------------------------
    model: "ols"            # "ols" (accurate) or "ridge" (faster)
    shift_intensity: true   # shift intensities before denoising
    clip_negative_vals: false
    b0_threshold: 50        # bvals <= this are b0 (never denoised)
    # ---------- sklearn_reference backend options -----------------------
    sklearn_model: "ols"          # "ols" | "ridge" | "lasso" | "mlp"
    patch_radius: [3, 3, 3]       # spatial half-width; [0,0,0] = per-voxel
    patch_stride: 1               # >1 subsamples the patch grid (faster, lower quality)
    use_b0_as_predictors: true    # include b0 vols as fixed predictor channels
  data:
    num_b0s: 6
    bvalue: 2500
    noise_sigma: 0.1
    noise_type: "rician"
    nii_path: "/home/paco/d_brain/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path: "/home/paco/d_brain/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
    nii_path_lightning: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_14_HCP_nless.nii"
    bvecs_path_lightning: "/teamspace/s3_folders/dwmri-dataset/D_BRAIN_b2500_6_60_HCP_b_matrix.txt"
  reconstruct:
    metrics_dir: "p2s/metrics/dbrain"
    images_dir: "p2s/images/dbrain"
    output_dir: "p2s/output/dbrain"
    compute_dti: true  # FA/MD/AD/RD MAE vs clean GT (DIPY); requires dBrain
    metrics_roi_threshold: 0.02  # ROI = voxels where original > threshold (tissue)
    generate_images: true
    num_image_volumes: 10   # number of DWI volumes to generate comparison images for

stanford:
  patch2self:
    # ---------- backend selection ----------------------------------------
    backend: "dipy"               # change to "sklearn_reference" to use MD-S2S style
    # ---------- DIPY backend options ------------------------------------
    model: "ols"
    shift_intensity: true
    clip_negative_vals: false
    b0_threshold: 50
    # ---------- sklearn_reference backend options -----------------------
    sklearn_model: "ols"          # "ols" | "ridge" | "lasso" | "mlp"
    patch_radius: [3, 3, 3]       # [0,0,0] = single-voxel patches (fast, low RAM)
    patch_stride: 1               # increase to 2+ to subsample and cut memory usage
    use_b0_as_predictors: true    # include b0 volumes as fixed predictor channels
  data:
    num_b0s: 10
    bvalue: 2000
    noise_sigma: 0.01
    noise_type: "rician"
  reconstruct:
    metrics_dir: "p2s/metrics/stanford"
    images_dir: "p2s/images/stanford"
    output_dir: "p2s/output/stanford"
    compute_dti: false  # no clean GT; pipeline writes skipped dti_metrics.json
    metrics_roi_threshold: 0.02
    generate_images: true
    num_image_volumes: 10
