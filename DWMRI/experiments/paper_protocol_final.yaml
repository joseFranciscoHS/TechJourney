protocol:
  id: "paper_final_v1"
  description: "Frozen protocol for real paper runs (D-Brain + Stanford, fixed split, full matrix)."
  created_utc: "2026-04-27T00:00:00Z"

reproducibility:
  global_seed: 91021
  fixed_split_strategy: "single_fixed_split"
  deterministic:
    reproducible: true
    note: "Set train.reproducible=true in training configs for stronger determinism."

splits:
  dbrain:
    split_id: "dbrain_fixed_v1"
    definition:
      volume_pair_source: "experiments/paper_export_dbrain_volume_pair.py"
      num_b0s: 6
      num_dwi_shell: 60
      note: "Single canonical crop and noise generation setup from package config."
  stanford:
    split_id: "stanford_fixed_v1"
    definition:
      num_b0s: 10
      num_dwi_shell: 150
      note: "No clean GT; use proxy/qualitative + runtime comparisons."

evaluation_policy:
  metrics_roi_threshold: 0.02
  rescale_to_01: true
  rescale_mode: "per_volume"
  clip_to_range: true
  dti:
    dbrain: true
    stanford: false
    normalization_domain: "fit DTI on de-normalized intensities (invert per-volume [0,1] before TensorModel)"
    mppca_requires_norm_params: true

datasets:
  dbrain:
    seed: 91021
    bvalue: 2500
    noise_sigma: 0.1
    shell_sampling_mode: "rgs"
    k_input: 16
    g_shell: 60
    target_channel: 15
  stanford:
    seed: 91022
    bvalue: 1000
    noise_sigma: 0.01
    shell_sampling_mode: "rgs"
    k_input: 16
    g_shell: 150
    target_channel: 15

matrix:
  models:
    - "drcnet_hybrid_rgs"
    - "restormer_hybrid_rgs"
  baselines:
    - "mppca"
    - "patch2self_dipy"
    - "mds2s"
    - "drcnet_supervised_upperbound"
    - "restormer_supervised_upperbound"
  baseline_scope_notes:
    mppca_stanford: "excluded from manifest due to lack of clean GT pair expected by current baseline runner"
    bm4d: "optional baseline, explicitly out of scope for this manifest version"
    patch2self_sklearn_reference: "excluded from manifest — sklearn_reference backend OOM/SIGKILL on full D-Brain volume (dense patch grid); reported P2S baseline is patch2self_dipy only (see src/plan_para_escribir_el_paper.md §2.3)"
  ablations:
    - "sampling_sequential_vs_rgs"
    - "conv2d_vs_conv3d"
    - "k_sweep"
    - "mask_p_sensitivity"
    - "n_context_sensitivity"
    - "n_preds_sensitivity"
    - "progressive_vs_standard"
    - "architecture_parity"
    - "n_context_stability"
    - "training_inference_gap_proxy"
    - "inference_time_grid"
  sweep_coverage:
    k_sweep:
      dbrain: [5, 10, 16, 24, 30]
      stanford: [5, 10, 16, 24, 30]
    mask_p_sensitivity: [0.1, 0.2, 0.3, 0.5, 0.7]
    n_context_sensitivity: [1, 3, 5, 12, 24, 48]
    n_preds_sensitivity:
      dbrain: [1, 3, 5, 10, 15, 20]
      fixed_n_context_samples: 16
      architectures: ["drcnet", "restormer"]
    noise_sigma_sensitivity:
      dbrain: [0.05, 0.10, 0.15, 0.20]
      methods:
        proposed_architectures: ["drcnet", "restormer"]
        baselines: ["mppca", "p2s_dipy", "mds2s"]
    architectures: ["drcnet", "restormer"]
  parity_2d_vs_3d:
    dataset: "dbrain"
    required_jobs:
      - "drcnet_dbrain_2d_rgs_k16_ablation"
      - "restormer_dbrain_2d_rgs_k16_ablation"
      - "restormer_dbrain_restormer2d_rgs_k16_ablation"
    constraints:
      seed: 91021
      shell_sampling_mode: "rgs"
      k_input: 16
      target_channel: 15
      mask_p: 0.3
      metrics_roi_threshold: 0.02
      rescale_mode: "per_volume"
      clip_to_range: true
      compute_dti: true
      registry_fields:
        - "regime"
        - "sampling_config.g_shell"
        - "sampling_config.k_input"
        - "sampling_config.target_channel"
        - "inference_config.n_context_samples"
        - "inference_config.n_preds"
        - "train_config.progressive_enabled"

manifest:
  file: "experiments/paper_manifest_final.yaml"
  smoke_file: "experiments/paper_manifest_smoke.yaml"
